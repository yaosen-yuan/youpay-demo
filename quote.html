<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漁人町｜報價單</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f7f4ef;
  --surface: #ffffff;
  --ink: #1c1814;
  --ink-muted: #7a6e64;
  --border: #e2d9cc;
  --accent: #2d6a4f;
  --accent-light: #e8f4ee;
  --warn: #c4763a;
  --gold: #b8962e;
  --red: #c0392b;
  --panel: #1c1814;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); font-family:'Noto Sans TC', sans-serif; color:var(--ink); min-height:100vh; }

/* ── Layout ── */
.app { display:grid; grid-template-columns:320px 1fr; min-height:100vh; }

/* ── Left Panel ── */
.panel-left {
  background:var(--panel);
  color:#f0ebe3;
  padding:32px 28px;
  position:sticky; top:0; height:100vh;
  overflow-y:auto;
  display:flex; flex-direction:column; gap:24px;
  scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.1) transparent;
}
.brand img { max-width:160px; display:block; border-radius:2px; }
.brand-sub { font-size:0.7rem; color:rgba(240,235,227,0.4); margin-top:8px; letter-spacing:0.08em; }
.section-label {
  font-size:0.63rem; font-weight:600; letter-spacing:0.2em;
  color:rgba(240,235,227,0.35); text-transform:uppercase; margin-bottom:12px;
}
.divider { height:1px; background:rgba(255,255,255,0.07); }
.field { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
.field label { font-size:0.72rem; color:rgba(240,235,227,0.55); letter-spacing:0.04em; }
.field input, .field textarea, .field select {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:2px;
  color:#f0ebe3;
  font-family:'Noto Sans TC', sans-serif;
  font-size:0.82rem;
  padding:7px 10px;
  outline:none;
  transition:border-color 0.2s;
  width:100%;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color:rgba(255,255,255,0.3); }
.field textarea { resize:vertical; min-height:56px; line-height:1.5; }
.field select option { background:#2a2520; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }

/* ── Right Panel ── */
.panel-right { padding:40px 48px; overflow-y:auto; }

/* Quote Preview */
.quote-preview {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:3px;
  margin-bottom:32px;
  overflow:hidden;
}
.qp-header {
  display:grid; grid-template-columns:1fr auto;
  align-items:start;
  padding:32px 36px 24px;
  border-bottom:2px solid var(--border);
  gap:24px;
}
.qp-logo img { max-width:140px; }
.qp-meta { text-align:right; }
.qp-meta .quote-title {
  font-family:'Noto Serif TC', serif;
  font-size:1.5rem; font-weight:700;
  color:var(--ink); letter-spacing:0.1em;
}
.qp-meta .quote-no {
  font-family:'DM Mono', monospace;
  font-size:0.78rem; color:var(--ink-muted);
  margin-top:4px;
}
.qp-meta .quote-validity {
  font-size:0.72rem; color:var(--ink-muted);
  margin-top:2px;
}

.qp-parties {
  display:grid; grid-template-columns:1fr 1fr;
  padding:24px 36px;
  border-bottom:1px solid var(--border);
  gap:24px;
}
.party-block h4 {
  font-size:0.63rem; font-weight:600; letter-spacing:0.18em;
  color:var(--ink-muted); text-transform:uppercase; margin-bottom:8px;
}
.party-block p { font-size:0.82rem; line-height:1.7; color:var(--ink); }
.party-block .company-name { font-weight:600; font-size:0.9rem; }

/* Items Table */
.qp-items { padding:0 0 0 0; }
.items-table { width:100%; border-collapse:collapse; }
.items-table thead tr {
  background:#f0ebe3;
  border-bottom:1px solid var(--border);
}
.items-table thead th {
  padding:10px 12px;
  font-size:0.68rem; font-weight:600; letter-spacing:0.12em;
  color:var(--ink-muted); text-transform:uppercase;
  text-align:left;
}
.items-table thead th:last-child,
.items-table thead th:nth-last-child(2),
.items-table thead th:nth-last-child(3),
.items-table thead th:nth-last-child(4) { text-align:right; }

.items-table tbody tr { border-bottom:1px solid var(--border); }
.items-table tbody tr.category-row { background:#faf7f2; }
.items-table tbody td { padding:9px 12px; font-size:0.82rem; color:var(--ink); vertical-align:middle; }
.items-table tbody td.category-label {
  font-family:'Noto Serif TC', serif;
  font-weight:600; font-size:0.78rem; letter-spacing:0.06em;
  color:var(--accent);
  padding-left:16px;
}
.items-table tbody td.num { text-align:right; font-family:'DM Mono', monospace; font-size:0.8rem; }
.items-table tbody td.desc { padding-left:24px; }
.items-table tfoot td {
  padding:8px 12px;
  font-size:0.82rem;
}
.items-table tfoot .subtotal-row td { border-top:1px solid var(--border); }
.items-table tfoot .discount-row td { color:var(--warn); }
.items-table tfoot .tax-row td { color:var(--ink-muted); }
.items-table tfoot .total-row td {
  font-family:'DM Mono', monospace;
  font-size:1.05rem; font-weight:700;
  border-top:2px solid var(--ink);
  padding-top:12px;
}
.items-table tfoot td.num { text-align:right; }
.items-table tfoot td.label { text-align:right; color:var(--ink-muted); font-size:0.75rem; letter-spacing:0.06em; }

.qp-footer {
  padding:20px 36px;
  border-top:1px solid var(--border);
  display:grid; grid-template-columns:1fr auto;
  gap:16px; align-items:start;
}
.qp-footer .notes { font-size:0.78rem; color:var(--ink-muted); line-height:1.7; }
.qp-footer .notes strong { color:var(--ink); display:block; margin-bottom:4px; font-size:0.72rem; letter-spacing:0.1em; }
.qp-footer .stamp {
  width:64px; height:64px;
  border:2px solid var(--border);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:0.62rem; color:var(--ink-muted); letter-spacing:0.08em;
  text-align:center; line-height:1.4;
}

/* ── Editor Section ── */
.editor-section { margin-bottom:32px; }
.editor-section h3 {
  font-family:'Noto Serif TC', serif;
  font-size:1rem; font-weight:700;
  margin-bottom:16px;
  display:flex; align-items:center; gap:8px;
}
.editor-section h3 span { font-size:0.65rem; color:var(--ink-muted); font-family:'Noto Sans TC', sans-serif; font-weight:400; }

/* Item Editor */
.item-editor {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:3px;
  overflow:hidden;
}
.item-editor-head {
  background:#f0ebe3;
  display:grid;
  grid-template-columns: 90px 1fr 70px 60px 90px 70px 32px;
  gap:0;
  border-bottom:1px solid var(--border);
}
.item-editor-head span {
  padding:8px 10px;
  font-size:0.63rem; font-weight:600; letter-spacing:0.12em;
  color:var(--ink-muted); text-transform:uppercase;
  border-right:1px solid var(--border);
}
.item-editor-head span:last-child { border-right:none; }

.item-row {
  display:grid;
  grid-template-columns: 90px 1fr 70px 60px 90px 70px 32px;
  border-bottom:1px solid var(--border);
  align-items:center;
}
.item-row:last-child { border-bottom:none; }
.item-row.cat-row { grid-template-columns:1fr 32px; background:#faf7f2; }
.item-row input, .item-row select {
  border:none; outline:none;
  padding:7px 10px;
  font-family:'Noto Sans TC', sans-serif;
  font-size:0.8rem;
  background:transparent;
  width:100%;
  height:36px;
  border-right:1px solid var(--border);
  color:var(--ink);
}
.item-row input[type=number] { font-family:'DM Mono', monospace; text-align:right; }
.item-row .btn-del {
  background:none; border:none; cursor:pointer;
  color:var(--border); font-size:1rem; height:36px; width:32px;
  display:flex; align-items:center; justify-content:center;
  transition:color 0.2s;
}
.item-row .btn-del:hover { color:var(--red); }
.item-row .cat-input {
  border:none; outline:none; background:transparent;
  padding:7px 12px;
  font-family:'Noto Serif TC', serif;
  font-size:0.82rem; font-weight:600; color:var(--accent);
  width:100%; height:36px;
  border-right:1px solid var(--border);
}
.add-btns {
  display:flex; gap:8px; padding:12px;
  border-top:1px solid var(--border);
  background:#faf7f2;
}
.btn-add {
  padding:6px 14px;
  font-size:0.75rem; font-family:'Noto Sans TC', sans-serif;
  border:1px solid var(--border);
  border-radius:2px; background:white;
  cursor:pointer; color:var(--ink-muted);
  transition:all 0.15s;
}
.btn-add:hover { border-color:var(--accent); color:var(--accent); }

/* Action Buttons */
.action-bar { display:flex; gap:12px; margin-bottom:40px; }
.btn-primary {
  padding:10px 24px;
  background:var(--ink); color:#f0ebe3;
  border:none; border-radius:2px;
  font-size:0.82rem; font-family:'Noto Sans TC', sans-serif;
  cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:opacity 0.15s;
}
.btn-primary:hover { opacity:0.85; }
.btn-secondary {
  padding:10px 24px;
  background:white; color:var(--ink);
  border:1px solid var(--border); border-radius:2px;
  font-size:0.82rem; font-family:'Noto Sans TC', sans-serif;
  cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:all 0.15s;
}
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); }

/* ══════════════════════════════
   RWD — TABLET (≤ 960px)
══════════════════════════════ */
@media (max-width: 960px) {
  .app { grid-template-columns: 280px 1fr; }
  .panel-left { padding: 24px 20px; }
  .panel-right { padding: 28px 24px; }
  .qp-header { padding: 24px 24px 18px; }
  .qp-parties { padding: 18px 24px; }
  .qp-footer { padding: 16px 24px; }
  .items-table thead th,
  .items-table tbody td,
  .items-table tfoot td { padding: 8px 10px; font-size: 0.78rem; }
}

/* ══════════════════════════════
   RWD — MOBILE (≤ 680px)
   → 上下堆疊: 設定欄在上, 預覽在下
══════════════════════════════ */
@media (max-width: 680px) {
  /* 整體改為單欄 */
  .app {
    display: flex;
    flex-direction: column;
  }

  /* 左側設定欄: 取消 sticky / 固定高度 */
  .panel-left {
    position: static;
    height: auto;
    padding: 20px 16px;
    overflow-y: visible;
  }

  /* 右側內容欄 */
  .panel-right {
    padding: 20px 14px;
  }

  /* nav bar */
  div[style*="position:sticky"] {
    padding: 10px 16px !important;
  }

  /* Quote preview 表格: 允許水平捲動 */
  .quote-preview {
    overflow-x: auto;
  }
  .qp-header {
    flex-direction: column;
    padding: 18px 16px 14px;
    gap: 12px;
  }
  .qp-meta { text-align: left; }
  .qp-meta .quote-title { font-size: 1.2rem; }
  .qp-parties {
    grid-template-columns: 1fr;
    padding: 14px 16px;
    gap: 16px;
  }
  .qp-footer {
    padding: 14px 16px;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .qp-footer .stamp { display: none; }

  /* 表格: 讓 items-table 在容器內捲動 */
  .qp-items { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .items-table { min-width: 540px; }
  .items-table thead th,
  .items-table tbody td,
  .items-table tfoot td { padding: 7px 8px; font-size: 0.74rem; }

  /* Item editor: 捲動 */
  .item-editor { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .item-editor-head { min-width: 520px; }
  .item-row { min-width: 520px; }

  /* row2 / row3 → 單欄 */
  .row2 { grid-template-columns: 1fr; }
  .row3 { grid-template-columns: 1fr 1fr; }

  /* action-bar: 全寬按鈕 */
  .action-bar { flex-direction: column; }
  .btn-primary, .btn-secondary {
    width: 100%;
    justify-content: center;
    padding: 12px 16px;
  }

  /* editor section h3 字型 */
  .editor-section h3 { font-size: 0.9rem; }
}

/* ── Print Styles ── */
@media print {
  body * { visibility:hidden; }
  .quote-preview, .quote-preview * { visibility:visible; }
  .quote-preview { position:fixed; top:0; left:0; width:100%; border:none; }
  .panel-left, .editor-section, .action-bar { display:none !important; }
}
</style>
</head>

<script>
// ── Data ──
let items = [
  { type:'cat', label:'辦公室租用' },
  { type:'item', desc:'共享座位（月租）', qty:2, unit:'座/月', price:3500, disc:0 },
  { type:'item', desc:'固定座位（月租）', qty:1, unit:'座/月', price:5800, disc:5 },
  { type:'cat', label:'設備與服務' },
  { type:'item', desc:'印表機用量（估計）', qty:200, unit:'頁', price:2, disc:0 },
  { type:'item', desc:'網路費（按戶）', qty:1, unit:'戶/月', price:413, disc:0 },
  { type:'item', desc:'飲水機（按戶）', qty:1, unit:'戶/月', price:303, disc:0 },
  { type:'cat', label:'其他費用' },
  { type:'item', desc:'辦公室耗材費（按戶分攤）', qty:1, unit:'戶/月', price:358, disc:0 },
  { type:'item', desc:'設置費（一次性）', qty:1, unit:'式', price:2000, disc:10 },
];

function fmt(n, cur) {
  if (cur === 'JPY') return '¥' + Math.round(n).toLocaleString();
  if (cur === 'USD') return '$' + n.toFixed(2);
  return '$' + Math.round(n).toLocaleString();
}

function calcItem(it) {
  const base = it.qty * it.price;
  const disc = base * (it.disc || 0) / 100;
  return base - disc;
}

// ── IME & Debounce Utilities ──
let _debounceTimer = null;
function debounce(fn, ms) {
  clearTimeout(_debounceTimer);
  _debounceTimer = setTimeout(fn, ms);
}

// Attach IME-safe listener to a text input
// Updates data model on compositionend + input (when not composing)
// Then calls callback (preview-only, no editor rebuild)
function bindText(el, getter, setter, callback) {
  let composing = false;
  el.addEventListener('compositionstart', () => { composing = true; });
  el.addEventListener('compositionend', () => {
    composing = false;
    setter(el.value);
    callback();
  });
  el.addEventListener('input', () => {
    if (!composing) {
      setter(el.value);
      callback();
    }
  });
}

// Attach debounced listener to a number input
function bindNumber(el, setter, callback) {
  el.addEventListener('input', () => {
    setter(parseFloat(el.value) || 0);
    debounce(callback, 120);
  });
}

// ── renderPreview: only updates the right-side preview, never touches editor DOM ──
function renderPreview() {
  const cur = v('q_currency') || 'TWD';
  const disc = parseFloat(v('q_discount')) || 0;
  const tax = parseFloat(v('q_tax')) || 0;
  const validity = parseInt(v('q_validity')) || 30;
  const qdate = v('q_date');

  document.getElementById('pv_no').textContent = '報價單號：' + v('q_no');
  document.getElementById('pv_validity').textContent = '報價日期：' + (qdate || '—') + '  ·  有效期：' + validity + ' 天';
  document.getElementById('pv_payment').textContent = '付款條件：' + v('q_payment');

  document.getElementById('pv_s_company').textContent = v('s_company');
  document.getElementById('pv_s_info').innerHTML =
    [v('s_taxid') ? '統編：' + v('s_taxid') : '', v('s_addr'), v('s_tel'), v('s_email')]
    .filter(Boolean).join('<br>');
  document.getElementById('pv_issuer_sub').textContent = v('s_tel') + '  ' + v('s_email');

  document.getElementById('pv_c_company').textContent = v('c_company') || '（未填寫）';
  document.getElementById('pv_c_info').innerHTML =
    [v('c_taxid') ? '統編：' + v('c_taxid') : '', v('c_contact') ? '聯絡人：' + v('c_contact') : '', v('c_tel'), v('c_addr')]
    .filter(Boolean).join('<br>');

  document.getElementById('pv_notes').textContent = v('q_notes');

  const tbody = document.getElementById('pv_tbody');
  tbody.innerHTML = '';
  let subtotal = 0;
  items.forEach(it => {
    const tr = document.createElement('tr');
    if (it.type === 'cat') {
      tr.className = 'category-row';
      tr.innerHTML = `<td class="category-label" colspan="6">▸ ${it.label}</td>`;
    } else {
      const sub = calcItem(it);
      subtotal += sub;
      tr.innerHTML = `
        <td class="desc">${it.desc || ''}</td>
        <td class="num">${it.qty}</td>
        <td>${it.unit || ''}</td>
        <td class="num">${fmt(it.price, cur)}</td>
        <td class="num">${it.disc ? it.disc + '%' : '—'}</td>
        <td class="num">${fmt(sub, cur)}</td>`;
    }
    tbody.appendChild(tr);
  });

  const globalDisc = subtotal * disc / 100;
  const afterDisc = subtotal - globalDisc;
  const taxAmt = afterDisc * tax / 100;
  const total = afterDisc + taxAmt;

  const tfoot = document.getElementById('pv_tfoot');
  tfoot.innerHTML = `
    <tr class="subtotal-row">
      <td colspan="5" class="label">小　計</td>
      <td class="num">${fmt(subtotal, cur)}</td>
    </tr>
    ${disc > 0 ? `<tr class="discount-row">
      <td colspan="5" class="label">整單折扣（${disc}%）</td>
      <td class="num">－ ${fmt(globalDisc, cur)}</td>
    </tr>` : ''}
    ${tax > 0 ? `<tr class="tax-row">
      <td colspan="5" class="label">稅金（${tax}%）</td>
      <td class="num">＋ ${fmt(taxAmt, cur)}</td>
    </tr>` : ''}
    <tr class="total-row">
      <td colspan="5" class="label" style="text-align:right;font-size:0.82rem;letter-spacing:0.1em;">合　計　${cur}</td>
      <td class="num">${fmt(total, cur)}</td>
    </tr>`;
}

// ── render: full rebuild (editor + preview) — only called on structure changes ──
function render() {
  renderEditor();   // rebuild editor DOM first
  renderPreview();  // then update preview
}

// ── renderEditor: rebuild editor rows, attach proper IME-safe listeners ──
function renderEditor() {
  const body = document.getElementById('itemEditorBody');
  body.innerHTML = '';
  items.forEach((it, i) => {
    const div = document.createElement('div');
    if (it.type === 'cat') {
      div.className = 'item-row cat-row';

      const inp = document.createElement('input');
      inp.className = 'cat-input';
      inp.value = it.label || '';
      inp.placeholder = '分類名稱';
      bindText(inp, () => {}, val => { items[i].label = val; }, renderPreview);

      const btn = document.createElement('button');
      btn.className = 'btn-del';
      btn.textContent = '✕';
      btn.onclick = () => removeItem(i);

      div.appendChild(inp);
      div.appendChild(btn);

    } else {
      div.className = 'item-row';

      // Type label
      const typeLabel = document.createElement('div');
      typeLabel.style.cssText = 'padding:4px 8px;font-size:0.7rem;color:var(--ink-muted);border-right:1px solid var(--border);height:36px;display:flex;align-items:center;';
      typeLabel.textContent = '品項';

      // desc (text, IME-safe)
      const descInp = document.createElement('input');
      descInp.value = it.desc || '';
      descInp.placeholder = '品項說明';
      bindText(descInp, () => {}, val => { items[i].desc = val; }, renderPreview);

      // qty (number, debounced)
      const qtyInp = document.createElement('input');
      qtyInp.type = 'number'; qtyInp.value = it.qty; qtyInp.min = '0'; qtyInp.step = '1';
      bindNumber(qtyInp, val => { items[i].qty = val; }, renderPreview);

      // unit (text, IME-safe)
      const unitInp = document.createElement('input');
      unitInp.value = it.unit || '';
      unitInp.placeholder = '單位';
      bindText(unitInp, () => {}, val => { items[i].unit = val; }, renderPreview);

      // price (number, debounced)
      const priceInp = document.createElement('input');
      priceInp.type = 'number'; priceInp.value = it.price; priceInp.min = '0';
      bindNumber(priceInp, val => { items[i].price = val; }, renderPreview);

      // disc (number, debounced)
      const discInp = document.createElement('input');
      discInp.type = 'number'; discInp.value = it.disc || 0;
      discInp.min = '0'; discInp.max = '100'; discInp.step = '0.5';
      bindNumber(discInp, val => { items[i].disc = val; }, renderPreview);

      // delete button
      const btn = document.createElement('button');
      btn.className = 'btn-del'; btn.textContent = '✕';
      btn.onclick = () => removeItem(i);

      [typeLabel, descInp, qtyInp, unitInp, priceInp, discInp, btn].forEach(el => div.appendChild(el));
    }
    body.appendChild(div);
  });
}

// ── Bind all left-panel inputs after DOM ready ──
function bindPanelInputs() {
  // Text inputs → IME-safe
  const textIds = ['s_company','s_taxid','s_addr','s_tel','s_email',
                   'c_company','c_taxid','c_contact','c_tel','c_addr','q_no'];
  textIds.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    // Remove old oninput
    el.oninput = null;
    bindText(el, () => {}, () => {}, renderPreview);
  });

  // Textarea
  const notes = document.getElementById('q_notes');
  if (notes) {
    notes.oninput = null;
    bindText(notes, () => {}, () => {}, renderPreview);
  }

  // Number inputs → debounced
  ['q_validity','q_discount','q_tax'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.oninput = null;
    el.addEventListener('input', () => debounce(renderPreview, 120));
  });

  // Date & selects → immediate (no IME concern)
  ['q_date','q_payment','q_currency'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.oninput = null;
    el.addEventListener('change', renderPreview);
    el.addEventListener('input', renderPreview);
  });
}

function v(id) { const el = document.getElementById(id); return el ? el.value : ''; }
function addCategory() { items.push({type:'cat',label:'新分類'}); render(); }
function addItem() { items.push({type:'item',desc:'',qty:1,unit:'',price:0,disc:0}); render(); }
function removeItem(i) { items.splice(i,1); render(); }
function resetItems() {
  if(confirm('確定重設所有品項？')) {
    items = [{type:'cat',label:'服務項目'},{type:'item',desc:'',qty:1,unit:'',price:0,disc:0}];
    render();
  }
}

// ── PDF / Print ──
function downloadPDF() { window.print(); }

// ── Excel ──
function downloadExcel() {
  const cur = v('q_currency') || 'TWD';
  const disc = parseFloat(v('q_discount')) || 0;
  const tax = parseFloat(v('q_tax')) || 0;
  
  const wb = XLSX.utils.book_new();
  const rows = [];

  // Header info
  rows.push(['漁人町｜報價單']);
  rows.push([]);
  rows.push(['報價單號', v('q_no'), '', '客戶', v('c_company')]);
  rows.push(['報價日期', v('q_date'), '', '聯絡人', v('c_contact')]);
  rows.push(['有效天數', v('q_validity') + ' 天', '', '聯絡電話', v('c_tel')]);
  rows.push(['付款條件', v('q_payment'), '', '統一編號', v('c_taxid')]);
  rows.push([]);
  rows.push(['品項說明', '數量', '單位', '單價', '折扣%', '小計']);

  let subtotal = 0;
  items.forEach(it => {
    if (it.type === 'cat') {
      rows.push(['▸ ' + it.label, '', '', '', '', '']);
    } else {
      const sub = calcItem(it);
      subtotal += sub;
      rows.push([it.desc, it.qty, it.unit, it.price, it.disc || 0, sub]);
    }
  });

  rows.push([]);
  rows.push(['', '', '', '', '小計', subtotal]);
  if (disc > 0) rows.push(['', '', '', '', `折扣 ${disc}%`, -(subtotal * disc / 100)]);
  const afterDisc = subtotal - subtotal * disc / 100;
  const taxAmt = afterDisc * tax / 100;
  if (tax > 0) rows.push(['', '', '', '', `稅金 ${tax}%`, taxAmt]);
  rows.push(['', '', '', '', '合計 ' + cur, afterDisc + taxAmt]);

  rows.push([]);
  rows.push(['備註', v('q_notes')]);
  rows.push([]);
  rows.push(['發票方', v('s_company'), v('s_addr'), v('s_tel'), v('s_email')]);

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:28},{wch:8},{wch:8},{wch:12},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws, '報價單');
  XLSX.writeFile(wb, `漁人町報價單_${v('q_no')}.xlsx`);
}

document.getElementById('q_date').value = today.toISOString().slice(0,10);
